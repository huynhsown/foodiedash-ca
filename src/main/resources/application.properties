server.port=${SERVER_PORT:9090}
server.forward-headers-strategy=framework

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=true
spring.flyway.clean-disabled=true
spring.flyway.locations=classpath:db/migration

logging.level.org.flywaydb=DEBUG

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.prometheus.enabled=true

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.folder=${CLOUDINARY_FOLDER:restaurants}

search.engine=${SEARCH_ENGINE:elasticsearch}

meilisearch.host=${MEILI_HOST:http://localhost:7700}
meilisearch.api-key=${MEILI_API_KEY}
meilisearch.index.restaurants=restaurants
meilisearch.auto-initialize=false

elasticsearch.host=${ES_HOST:http://localhost:9200}
elasticsearch.index.restaurants=restaurants
elasticsearch.auto-initialize=true

openrouteservice.api.key=${ORS_API_KEY}
openrouteservice.base-url=https://api.openrouteservice.org

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2s

voucher.lock.ttl-seconds=900

vnpay.tmn-code=${VNPAY_TMN_CODE}
vnpay.hash-secret=${VNPAY_HASH_SECRET}
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=${VNPAY_RETURN_URL}
vnpay.ipn-url=${VNPAY_IPN_URL}

driver.dispatch.geo-key=foodiedash:available_drivers
driver.dispatch.search-radius-km=10
driver.dispatch.pending-set-key=foodiedash:driver_assignment_pending
driver.dispatch.lock-key-prefix=foodiedash:driver_assign_lock:
driver.dispatch.lock-ttl-seconds=30
driver.dispatch.retry-interval-ms=30000
driver.dispatch.driver-busy-key-prefix=foodiedash:driver_busy:
driver.dispatch.driver-busy-ttl-hours=8
driver.dispatch.tracking-geo-key=foodiedash:driver_tracking_geo
driver.dispatch.geo-candidate-limit=20

app.internal-test-apis-enabled=${INTERNAL_APIS_ENABLED:true}

app.websocket.allowed-origins=${WS_ALLOWED_ORIGINS:http://localhost:4200}
app.websocket.endpoint=/ws
app.websocket.driver.destination-prefix=/app
app.websocket.broker-prefixes=/topic,/queue