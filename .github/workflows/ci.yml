name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test (PostgreSQL + Flyway)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: foodiedash
          POSTGRES_USER: foodiedash
          POSTGRES_PASSWORD: foodiedash
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U foodiedash -d foodiedash"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_URL: jdbc:postgresql://localhost:5432/foodiedash
      DB_USERNAME: foodiedash
      DB_PASSWORD: foodiedash
      SEARCH_ENGINE: elasticsearch
      ES_HOST: http://localhost:9200
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci_dummy_secret_please_override_in_real_env
      JWT_EXPIRATION: 86400
      GOOGLE_CLIENT_ID: ci_dummy
      GOOGLE_CLIENT_SECRET: ci_dummy
      CLOUDINARY_CLOUD_NAME: ci_dummy
      CLOUDINARY_API_KEY: ci_dummy
      CLOUDINARY_API_SECRET: ci_dummy
      CLOUDINARY_FOLDER: restaurants
      MEILI_HOST: http://localhost:7700
      MEILI_API_KEY: ci_dummy
      ORS_API_KEY: ci_dummy
      VNPAY_TMN_CODE: ci_dummy
      VNPAY_HASH_SECRET: ci_dummy
      VNPAY_RETURN_URL: http://localhost:8080/api/v1/payment/vnpay/return
      VNPAY_IPN_URL: http://localhost:8080/api/payment/vnpay/ipn
      INTERNAL_APIS_ENABLED: "true"
      WS_ALLOWED_ORIGINS: http://localhost:4200

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify with Maven
        run: mvn -B -ntp clean verify

  docker-build:
    name: Validate Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t foodiedash-backend:ci .

